name: Java CI/CD with Security & Code Quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
    # Step 1: Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # Step 2: Set up JDK
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Step 3: Security scanning initializing (CodeQL)
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: java

    # Step 4: Build Maven project
    - name: Build with Maven
      run: |
        chmod +x mvnw
        ./mvnw clean package -DskipTests

    # Step 5: Perform CodeQL Analysis
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

    # Step 5: Login to Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERUSERNAME }}
        password: ${{ secrets.DOCKERPASS }}

    # Step 6: Build Docker image
    - name: Build Docker image
      run: docker build -t 0xalit/e-commerce-api:latest .

    # Step 7: Push Docker image to Docker Hub
    - name: Push Docker image
      run: docker push 0xalit/e-commerce-api:latest

    # Step 8: Tag Docker image with commit SHA and push
    - name: Tag Docker image with commit SHA
      run: |
        docker tag 0xalit/e-commerce-api:latest 0xalit/e-commerce-api:${{ github.sha }}
        docker push 0xalit/e-commerce-api:${{ github.sha }}